name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify tag before release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

      - name: Build CLI
        run: go build ./cmd/loglint

  create_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Create or reuse release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: create_release
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/loglint${{ matrix.ext }}" ./cmd/loglint

      - name: Package archive
        id: package
        run: |
          archive="loglint_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}"
          mkdir -p package
          cp "dist/loglint${{ matrix.ext }}" "package/loglint${{ matrix.ext }}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd package && zip -r "../dist/${archive}" .)
          else
            tar -C package -czf "dist/${archive}" .
          fi

          sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            "dist/${{ steps.package.outputs.archive }}" \
            "dist/${{ steps.package.outputs.archive }}.sha256" \
            --clobber