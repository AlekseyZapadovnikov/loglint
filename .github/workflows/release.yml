name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify tag before release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

      - name: Build standalone CLI
        run: go build ./cmd/loglint

      - name: Install golangci-lint builder
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.3/install.sh | sh -s -- -b "$(pwd)/bin" v2.11.3
          ./bin/golangci-lint --version

      - name: Build custom-gcl
        run: |
          ./bin/golangci-lint custom --config .custom-gcl.yaml
          test -f ./custom-gcl || test -f ./custom-gcl.exe

  create_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Create or reuse release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: create_release
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint builder
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.3/install.sh | sh -s -- -b "$(pwd)/bin" v2.11.3
          ./bin/golangci-lint --version

      - name: Build release binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          ./bin/golangci-lint custom --config .custom-gcl.yaml
          custom_bin="./custom-gcl"
          if [ -f "./custom-gcl.exe" ]; then
            custom_bin="./custom-gcl.exe"
          fi
          if [ ! -f "$custom_bin" ]; then
            echo "custom-gcl binary was not produced"
            exit 1
          fi
          cp "$custom_bin" "dist/custom-gcl${{ matrix.ext }}"

          go build -trimpath -ldflags="-s -w" -o "dist/loglint${{ matrix.ext }}" ./cmd/loglint

      - name: Package archive
        id: package
        run: |
          archive_custom="custom-gcl_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}"
          archive_loglint="loglint_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}"
          mkdir -p package/custom-gcl package/loglint
          cp "dist/custom-gcl${{ matrix.ext }}" "package/custom-gcl/custom-gcl${{ matrix.ext }}"
          cp "dist/loglint${{ matrix.ext }}" "package/loglint/loglint${{ matrix.ext }}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd package/custom-gcl && zip -r "../../dist/${archive_custom}" .)
            (cd package/loglint && zip -r "../../dist/${archive_loglint}" .)
          else
            tar -C package/custom-gcl -czf "dist/${archive_custom}" .
            tar -C package/loglint -czf "dist/${archive_loglint}" .
          fi

          sha256sum "dist/${archive_custom}" > "dist/${archive_custom}.sha256"
          sha256sum "dist/${archive_loglint}" > "dist/${archive_loglint}.sha256"
          echo "archive_custom=${archive_custom}" >> "$GITHUB_OUTPUT"
          echo "archive_loglint=${archive_loglint}" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            "dist/${{ steps.package.outputs.archive_custom }}" \
            "dist/${{ steps.package.outputs.archive_custom }}.sha256" \
            "dist/${{ steps.package.outputs.archive_loglint }}" \
            "dist/${{ steps.package.outputs.archive_loglint }}.sha256" \
            --clobber
