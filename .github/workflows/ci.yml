name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feat/**'
      - 'feature/**'
      - 'fix/**'
      - 'bugfix/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, test and validate plugin integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Build all packages
        run: go build ./...

      - name: Build CLI binary
        run: |
          mkdir -p dist
          go build -o dist/loglint ./cmd/loglint

      - name: Validate golangci-lint module plugin integration
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=5m ./...

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: loglint-linux-amd64
          path: dist/loglint
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error
          retention-days: 14